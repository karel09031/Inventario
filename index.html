<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mi Inventario</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="app-container">
    
<header class="app-header">
    <div class="header-container">
        <div class="header-left">
            <h1 class="logo">Inventario</h1>
            <div class="total-box">Total Global: <span id="global-total">0</span></div>
        </div>
        <button id="btn-toggle-vista" onclick="toggleModo()" class="btn-toggle-modo">Historial</button>
    </div>
</header>

    <main class="app-layout">
      <section class="bloques-section">
        <input type="text" id="buscador" class="search-bar" placeholder="🔍 Buscar pared o bloque...">

        <div id="titulo-pared-dinamico" class="pared-header-panel">
            Pared: <b>Selecciona una</b>
        </div>

        <div id="lista-bloques" class="lista-bloques">
            <p class="mensaje-vacio">Selecciona una pared para ver sus bloques.</p>
        </div>

        <div id="total-container"></div>
      </section>

      <aside class="paredes-section">
        <div class="paredes-header">
            <button id="btn-nueva-pared" class="btn-agregar-pared">
              <i data-lucide="plus"></i>
            </button>
        </div>
        <ul id="lista-paredes" class="lista-paredes"></ul>
      </aside>
    </main>

    <section id="seccion-historial" class="historial-section" style="display: none;">
    <div id="fecha-actual" class="panel-fecha"></div>

    <div class="historial-header" style="padding: 10px; display: flex; gap: 5px;">
        <input type="date" id="fecha-inicio" class="input-form" style="margin:0;">
        <input type="date" id="fecha-fin" class="input-form" style="margin:0;">
        <button onclick="cargarHistorial()" class="btn-guardar" style="margin:0;">Filtrar</button>
    </div>
    <div id="lista-historial" class="lista-bloques" style="padding: 10px;">
    </div>
</section>

    <div id="modal-pared" class="modal oculto">
      <div class="modal-contenido">
        <h3>Agregar Nueva Pared</h3>
        
        <div class="modal-body">
            <label>Nombre de la Pared:</label>
            <input type="text" id="input-nombre-pared" placeholder="Ej. 59FI MLB" class="input-form">
            
            <label>Número de Bloques:</label>
            <input type="number" id="input-num-bloques" placeholder="Ej. 3" class="input-form" min="1" max="20">
            
            <button id="btn-generar-bloques" class="btn-guardar">Generar Bloques</button>
            
            <div id="contenedor-nombres-bloques" class="contenedor-bloques-dinamicos"></div>
        </div>

        <div class="modal-botones">
          <button id="btn-cancelar" class="btn-cancelar">Cancelar</button>
          <button id="btn-guardar-pared" class="btn-guardar" disabled>Guardar</button>
        </div>
      </div>
    </div>

    <div id="modal-alerta" class="modal oculto">
      <div class="modal-contenido">
        <h3 id="alerta-titulo">Atención</h3>
        <p id="alerta-msg" style="margin-bottom: 20px; font-size: 1rem; font-weight: 500;"></p>
        <div class="modal-botones">
          <button id="btn-alerta-cerrar" class="btn-guardar">Entendido</button>
        </div>
      </div>
    </div> 

    <div id="modal-confirm" class="modal oculto">
      <div class="modal-contenido">
        <h3 id="confirm-msg">¿Estás seguro?</h3>
        <div class="modal-botones">
          <button id="btn-confirm-no" class="btn-cancelar">No</button>
          <button id="btn-confirm-si" class="btn-guardar">Sí</button>
        </div>
      </div>
    </div>

    <div id="toast-undo" class="toast-undo oculto">
        <span id="toast-msg">Acción realizada</span>
        <button onclick="ejecutarUndo()" style="cursor:pointer; background: white; border: none; padding: 5px 10px; border-radius: 4px;">Deshacer</button>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
