<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mi Inventario</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Ícono para la pestaña del navegador -->
  <link rel="icon" type="image/png" href="favicon-blanco.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="app-container">
    
        <header class="app-header">
            <div id="header-fecha" class="header-side"></div>
            <div class="header-center">
                <div class="logo">Inventario</div>
                <div class="total-box">
                    <span class="total-label">Total Global: </span>
                    <span id="global-total">0</span>
                </div>
            </div>
            <!-- Botón de Historial con nuevo estilo -->
            <button id="btn-toggle-vista" class="btn-deslizar header-side" onclick="toggleModo()">
                <span class="slide-content" id="slide-default"><i data-lucide="history"></i></span>
                <span class="slide-content" id="slide-alternate"><i data-lucide="home"></i></span>
            </button>
        </header>

    <main class="app-layout" style="display: flex;">
      <section class="bloques-section">
        <div class="search-container">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" id="buscador" class="search-bar" placeholder="Buscar">
        </div>
        <div class="panel-header-con-controles">
            <div id="titulo-pared-dinamico" class="pared-header-panel">
                Pared: <b>Selecciona una</b>
            </div>
            <div class="controles-panel">
                <button id="btn-ordenar-bloques" class="btn-control" title="Ordenar bloques">
                    <i data-lucide="more-vertical"></i>
                </button>
                <div id="menu-ordenar" class="dropdown-menu oculto"></div>
            </div>
        </div>

        <div id="lista-bloques" class="lista-bloques">
            <p class="mensaje-vacio">Selecciona una pared para ver sus bloques.</p>
        </div>
        <!-- Panel de total de pared movido aquí abajo -->
        <div id="total-pared-panel" class="pared-header-panel" style="background-color: var(--card-bg); color: #333; margin-top: 10px; flex: 0;">
            <span class="panel-label">Total Pared:</span><b class="panel-value">0</b>
        </div>

      </section>

      <aside class="paredes-section">
        <div class="paredes-header">
    <button id="btn-nueva-pared" class="btn-simple-zoom" onclick="abrirModalNuevaPared()">
        <i data-lucide="plus-circle"></i> Nueva Pared
    </button>    
    <div id="controles-edicion-paredes" style="margin-bottom: 10px;">
        <button id="btn-toggle-edicion" class="btn-deslizar btn-edicion">
            <span class="slide-content" id="slide-editar"><i data-lucide="pencil"></i> Editar</span>
            <span class="slide-content" id="slide-cancelar"><i data-lucide="x"></i> Cancelar</span>
        </button>
    </div>
</div>
        <ul id="lista-paredes" class="lista-paredes seccion-bloqueada"></ul>
      </aside>
    </main>

    <section id="seccion-historial" class="historial-section" style="display: none;">
    <!-- Nueva barra de acciones para selección múltiple -->
    <div id="historial-acciones-seleccion" class="historial-acciones-bar oculto">
        <button id="btn-cancelar-seleccion" class="btn-control" style="flex: 0; padding: 8px;"><i data-lucide="x"></i></button>
        <div id="contador-seleccion" class="contador-seleccion-display">0 seleccionados</div>
        <button id="btn-eliminar-seleccionados" class="btn-control btn-eliminar" style="flex: 0; padding: 8px;"><i data-lucide="trash-2"></i></button>
    </div>

    <div id="fecha-actual" class="panel-fecha"></div>

    <!-- Controles de búsqueda y acciones de historial -->
    <div class="historial-controles">
        <div class="search-container" style="flex: 1; margin: 0;">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" id="buscador-historial" class="search-bar" placeholder="Buscar por bloque, pared u hora...">
        </div>
        <!-- Contador de movimientos de hoy -->
        <div id="contador-movimientos-hoy" class="contador-movimientos">0</div>
        <!-- Nuevo botón de filtro con menú desplegable -->
        <div class="controles-panel">
            <button id="btn-filtro-historial" class="btn-control" title="Filtrar historial"><i data-lucide="sliders-horizontal"></i></button>
            <div id="menu-filtro-historial" class="dropdown-menu oculto"></div>
        </div>
    </div>
    <div id="historial-filtros-fecha" class="historial-header" style="padding: 0 10px 10px; display: none; gap: 5px;">
        <input type="date" id="fecha-inicio" class="input-form" style="margin:0;">
        <input type="date" id="fecha-fin" class="input-form" style="margin:0;">
    </div>
    <!-- Nuevo contenedor para la lista para gestionar el scroll de forma independiente -->
    <div class="lista-historial-container">
        <div id="lista-historial"></div>
    </div>    
</section>

    <div id="modal-pared" class="modal oculto">
      <div class="modal-contenido">
        <h3>Agregar Nueva Pared</h3>
        
        <div class="modal-body">
            <label>Nombre de la Pared:</label>
            <input type="text" id="input-nombre-pared" placeholder="Ej. 59FI MLB" class="input-form">
            
            <label>Número de Bloques:</label>
            <input type="number" id="input-num-bloques" placeholder="Ej. 3" class="input-form" min="1" max="20">
            
            <button id="btn-generar-bloques" class="btn-modal btn-modal-secondary">
                <i data-lucide="wand-2"></i> Generar Bloques
            </button>
            
            <div id="contenedor-nombres-bloques" class="contenedor-bloques-dinamicos"></div>
        </div>

        <div class="modal-botones">
          <button id="btn-cancelar" class="btn-modal btn-modal-cancel">
            <i data-lucide="x"></i> Cancelar
          </button>
          <button id="btn-guardar-pared" class="btn-modal btn-modal-primary" disabled>
            <i data-lucide="save"></i> Guardar
          </button>
        </div>
      </div>
    </div>

    <div id="modal-alerta" class="modal oculto">
      <div class="modal-contenido">
        <h3>Atención</h3>
        <p id="alerta-msg" style="font-size: 1rem; font-weight: 500;"></p>
        <div class="modal-botones">
          <button id="btn-alerta-cerrar" class="btn-modal btn-modal-primary">
            <i data-lucide="check"></i> Entendido
          </button>
        </div>
      </div>
    </div> 

    <div id="modal-confirm" class="modal oculto">
      <div class="modal-contenido">
        <h3 id="confirm-msg">¿Estás seguro?</h3>
        <div class="modal-botones">
          <button id="btn-confirm-no" class="btn-modal btn-modal-cancel">
            <i data-lucide="x"></i> No
          </button>
          <button id="btn-confirm-si" class="btn-modal btn-modal-danger">
            <i data-lucide="check"></i> Sí
          </button>
        </div>
      </div>
    </div>

    <!-- Nuevo Contenedor para Notificaciones (Toasts) -->
    <div id="feedback-toast" class="feedback-toast oculto"></div>

    <!-- Toast de Deshacer Rediseñado -->
    <div id="toast-undo" class="toast-undo oculto">
        <div class="toast-content">
            <i data-lucide="info" class="toast-icon"></i>
            <span id="toast-msg">Cambio registrado</span>
        </div>
        <button onclick="ejecutarUndo()" class="btn-control btn-undo">Deshacer</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
